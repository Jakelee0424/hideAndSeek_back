spring:
  application:
    name: game3d-server
  datasource:
    url: jdbc:h2:mem:game3d;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

game:
  # 프론트 LocalPlayer.tsx의 SPEED와 반드시 일치 (권위 서버 검증용)
  speed: 6.0
  # 틱 주기(ms). 20 tick/s = 50ms
  tick-ms: 50
  # 맵 경계(반지름). Ground 100x100 평면 → ±50
  half-extent: 50.0
  # 입력 무응답 시 플레이어 정지로 간주하는 시간(ms)
  input-timeout-ms: 500

  bot:
    llm:
      # 기본 off. 켜두면 브라우저만 열어놔도 무료 한도가 샌다(방마다 봇이 자동 스폰됨).
      # 켤 때: GROQ_API_KEY 환경변수 + game.bot.llm.enabled=true
      enabled: false
      # llama-3.1-8b-instant는 한도가 14배 넉넉하지만 2026-08-16 종료(무료·개발자 티어)라 안 쓴다.
      # gpt-oss-20b 무료 한도 실측(2026-07): 1,000 요청/일 · 8,000 토큰/분.
      model: openai/gpt-oss-20b
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY:}
      # 1,000 요청/일 ÷ 10콜/분 = 봇 켜둔 채로 하루 100분. 15분 플레이 기준 6~7판.
      # 토큰은 약 500/콜 × 10콜/분 ≈ 5,000 TPM으로 8,000 한도 안쪽.
      interval-ms: 6000
      # tick(50ms)을 막지 않으니 넉넉해도 되지만, 응답이 이보다 늦으면 그 계획은 버린다.
      timeout-ms: 4000

# CORS/WS 허용 오리진(프론트)
cors:
  allowed-origins: "http://localhost:3000"
