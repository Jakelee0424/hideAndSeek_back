spring:
  application:
    name: game3d-server
  jackson:
    deserialization:
      # 클라가 안 보낸 primitive 필드를 기본값(false/0)으로 받는다.
      # Jackson 3은 이게 켜져 있으면 "없는 필드 → null → primitive" 매핑을 실패로 처리해
      # **메시지 전체를 거부**한다. 2026-07-18 InputMessage에 sprint/jump(boolean)를 추가했을 때
      # 그 필드를 안 보내는 구버전 클라의 이동 입력이 전부 막혔다(캐릭터가 아예 안 움직임).
      # DTO에 필드를 더할 때마다 구버전 클라를 깨뜨리지 않으려면 이 설정이 필요하다.
      fail-on-null-for-primitives: false
  datasource:
    url: jdbc:h2:mem:game3d;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

game:
  # 프론트 LocalPlayer.tsx의 SPEED와 반드시 일치 (권위 서버 검증용)
  speed: 6.0
  # 아래 셋도 프론트 LocalPlayer.tsx 상수와 이중 관리다. 어긋나면 클라 예측이 서버와 벌어져
  # 러버밴딩이 생긴다(특히 점프는 착지 시점이 눈에 띄게 튄다).
  #   sprint-multiplier ↔ SPRINT_MULT / jump-speed ↔ JUMP_SPEED / gravity ↔ GRAVITY
  sprint-multiplier: 1.8   # 달리기 배수 → 6.0 * 1.8 = 10.8 m/s
  jump-speed: 6.0          # 점프 초기 수직 속도(m/s). 최고 높이 = v²/2g = 1.0m
  gravity: 18.0            # 중력 가속도(m/s²). 9.8은 게임에선 너무 붕 떠서 크게 잡았다
  # 틱 주기(ms). 20 tick/s = 50ms
  tick-ms: 50
  # 맵 경계(반지름). Ground 100x100 평면 → ±50
  half-extent: 50.0
  # 입력 무응답 시 플레이어 정지로 간주하는 시간(ms)
  input-timeout-ms: 500
  # 방 하나에 들어갈 수 있는 사람 수(AI 봇 제외).
  # 아래 queue.capacity는 서버 전체 동시 접속이라 방 정원이 아니다 — 방을 막는 건 이 값이다.
  max-players-per-room: 3
  # 이 방 코드로 들어가면 준비·시작을 기다리지 않고 바로 시작하고, 단계도 짧게(약 2분 15초)
  # 돌아 혼자서도 투표·결말까지 확인할 수 있다. 개발·시연 점검용 뒷문이라 비우면 닫힌다.
  test-room-code: TEST

  # 접속 대기열(Virtual Waiting Room). 정원을 넘으면 FIFO로 줄을 세운다.
  # 단일 인스턴스 인메모리라 서버를 재시작하면 큐가 비워진다(WaitingQueue 주석 참고).
  queue:
    enabled: true
    # 동시 입장 정원. 데모에서 대기열을 실제로 보여주려면 1~2로 낮춰 띄운다:
    #   --game.queue.capacity=2
    capacity: 8
    # 승급 후 이 시간 안에 STOMP join이 없으면 슬롯을 회수한다(자리 점유 방지).
    # 접속에 성공한 뒤에는 적용되지 않는다 — 게임 중에 쫓겨나면 안 되니까.
    token-ttl: 30s

  # 진행 단계별 길이. 총 20분.
  # 시계는 방에 첫 사람이 들어온 시점(=방의 첫 tick)부터 흐른다. 별도 "게임 시작" 신호가 아직 없다.
  # 데모/검증에서 20분을 다 기다릴 수 없으니 짧게 덮어써서 돌린다:
  #   --game.phases.onboarding=5s --game.phases.mission=5s --game.phases.sharing=5s --game.phases.vote=5s
  phases:
    onboarding: 2m    # 소등(도입 내레이션)
    mission: 10m      # 감방 탈출
    sharing: 3m       # 단서 공유 + 조각 조합
    vote: 5m          # 색출 + 결말 연출

  # 정기 순찰 — 도는 동안 움직이거나 무언가를 건드리면 걸린다.
  # 시스템이 조작을 막지는 않는다. 멈추는 건 플레이어 몫이고, 걸리면 자정이 앞당겨진다.
  # 도는 구간은 감방 탈출 + 단서 공유다(소등은 규칙 읽는 시간, 색출은 투표창이 떠 있다).
  patrol:
    enabled: true
    # 한 판에 도는 횟수. 이 사이에서 뽑는다.
    min-count: 1
    max-count: 2
    # 1회 지속 시간. 이 사이에서 뽑는다.
    min-duration: 20s
    max-duration: 30s
    # 순찰 사이 최소 간격. 연달아 터져 손쓸 틈이 없어지는 걸 막는다.
    min-gap: 90s
    # 시작 전 예고. 이 동안 멈출 준비를 한다(예고 중에는 걸리지 않는다).
    warn: 4s
    # 걸렸을 때 앞당겨지는 자정. 순찰 1회당 한 번만 적용된다 —
    # 셋이 동시에 움직였다고 3분을 깎으면 한 번의 실수로 판이 끝난다.
    penalty: 1m
    # 이 크기를 넘는 이동 의도를 "움직였다"로 본다(부동소수 찌꺼기 제거).
    move-epsilon: 0.05
    # 봇이 순찰 중 실수할 확률. 0으로 두지 말 것 — 봇은 스크립트라 완벽히 멈출 수 있는데
    # 사람은 반드시 언젠가 흘린다. "한 번도 안 걸린 놈"이 곧 AI가 되어 마지막 투표가
    # 무의미해진다.
    bot-slip-chance: 0.25

  bot:
    llm:
      # 기본 off. 켜두면 브라우저만 열어놔도 무료 한도가 샌다(방마다 봇이 자동 스폰됨).
      # 켤 때: GROQ_API_KEY 환경변수 + game.bot.llm.enabled=true
      enabled: false
      # 호출마다 라운드 로빈으로 고른다. Groq 무료 한도는 모델별로 따로 걸리므로,
      # 나눠 쓰면 TPM 상한이 사실상 모델 수만큼 늘어난다.
      #   ⚠️ 같은 계정의 API 키를 여러 개 만들어 돌리는 건 소용없다 — 한도는 키가 아니라
      #      조직 단위로 잡힌다. 늘릴 수 있는 축은 모델이지 키가 아니다.
      # gpt-oss-20b 무료 한도 실측(2026-07): 1,000 요청/일 · 8,000 토큰/분.
      # llama-3.1-8b-instant는 한도가 14배 넉넉하지만 2026-08-16 종료(무료·개발자 티어)라
      # 주력으로 두지 않고 보조로만 섞는다. 종료되면 목록에서 빼면 된다.
      models:
        - openai/gpt-oss-20b
        - llama-3.3-70b-versatile
        - llama-3.1-8b-instant
      base-url: https://api.groq.com/openai/v1
      api-key: ${GROQ_API_KEY:}
      # 429를 받은 모델을 이 시간 동안 건너뛴다. TPM은 분 단위로 회복되므로 60초로 잡았다.
      cooldown-ms: 60000
      # 1,000 요청/일 ÷ 10콜/분 = 봇 켜둔 채로 하루 100분. 15분 플레이 기준 6~7판.
      # 토큰은 약 500/콜 × 10콜/분 ≈ 5,000 TPM으로 8,000 한도 안쪽.
      interval-ms: 6000
      # tick(50ms)을 막지 않으니 넉넉해도 되지만, 응답이 이보다 늦으면 그 계획은 버린다.
      timeout-ms: 4000

# CORS/WS 허용 오리진(프론트)
cors:
  allowed-origins: "http://localhost:3000"
